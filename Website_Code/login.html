<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>VidyaDrishti Login</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: "Lato", sans-serif;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            background: url("bg_color.png");
        }

        .vd-div {
            width: 430px;
            height: 500px;
            padding: 20px 35px 15px 35px;
            border-radius: 35px;
            background: url("back.png");
            box-shadow: -6px -6px 6px rgba(255, 255, 255, 0.8),
                        6px 6px 6px rgba(0, 0, 0, 0.2);
        }

        .vd-logo {
            background: url("logo.png");
            background-size: cover;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin: 0 auto;
        }

        .vd-title {
            text-align: center;
            font-size: 35px;
            padding-top: 30px;
            letter-spacing: 0.5px;
            color: #692b39;
        }

        .vd-sub-title {
            text-align: center;
            font-size: 15px;
            padding-top: 7px;
            letter-spacing: 3px;
            color: #692b39;
        }

        .vd-input-fields {
            width: 100%;
            padding: 20px 5px 10px 5px;
        }

        .vd-input-fields input {
            border: none;
            outline: none;
            background: none;
            font-size: 18px;
            color: #555;
            padding: 15px 10px 15px 5px;
        }

        .vd-email,
        .vd-password {
            margin-bottom: 20px;
            border-radius: 20px;
            box-shadow: inset 5px 5px 5px #cbced1,
                        inset -5px -5px 5px #ffffff;
        }

        .vd-button {
            outline: none;
            border: none;
            cursor: pointer;
            width: 100%;
            height: 60px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: 700;
            font-family: "Lato", sans-serif;
            color: #fff;
            text-align: center;
            background: #692b39;
            box-shadow: 7px 7px 8px #cbced1, -7px -7px 8px #ffffff;
            transition: all 0.4s ease;
        }

        .vd-button:hover {
            transform: translateY(-4px);
            box-shadow: 10px 10px 15px #cbced1, -10px -10px 15px #ffffff;
            background: linear-gradient(45deg, #7b2d9f, #fdd82e);
        }

        .vd-button:active {
            transform: scale(0.96);
            box-shadow: inset 5px 5px 10px #cbced1,
                        inset -5px -5px 10px #ffffff;
        }
    </style>
</head>

<body>
    <div class="vd-div">
        <div class="vd-logo"></div>
        <div class="vd-title">VidyaDrishti</div>
        <div class="vd-sub-title">Faculty Login</div>
        <div class="vd-input-fields">
            <div class="vd-email">
                <img src="gmail.png" alt="email icon" style="height:22px; margin:0 10px -3px 25px;">
                <input id="email" type="email" placeholder="email" />
            </div>
            <div class="vd-password">
                <img src="key.png" alt="password icon" style="height:22px; margin:0 10px -3px 25px;">
                <input id="password" type="password" placeholder="password" />
            </div>
        </div>
        <button class="vd-button" onclick="login()">VidyaDrishti Sign In Page</button>
    </div>

    <script>
        function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            
            if (email === "abc@gmail.com" && password === "123") {
                // Redirect to your Streamlit app URL
                window.location.href = "YOUR_NGROK_LINK";
            } else {
                alert("Invalid email or password");
            }
        }
    </script>
</body>

</html>
